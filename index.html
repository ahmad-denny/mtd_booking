<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Direct Performance Region Sumatera</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f0f2f5; padding: 10px; margin: 0; }
        .container { width: 100%; max-width: 600px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.08); box-sizing: border-box; }
        
        /* Header Ala Video */
        .header-title { 
            color: white; 
            background: linear-gradient(135deg, #6a1b9a, #8e24aa); 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center;
            margin-bottom: 15px;
        }
        .header-title h2 { margin: 0; font-size: 16px; font-weight: bold; }
        .as-of-date { font-size: 12px; opacity: 0.9; display: block; margin-top: 5px; }
        
        /* Input Search */
        .search-input {
            width: 100%;
            padding: 10px 15px;
            margin-bottom: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }

        /* Filter Grid (2 Kolom) */
        .filter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 12px;
        }
        select { 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 13px; 
            background-color: #fff;
            outline: none;
            width: 100%;
        }

        /* Button Group Compact */
        .button-group {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .btn { 
            flex: 1; 
            padding: 10px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            color: white; 
            font-size: 12px; 
            transition: 0.3s;
            text-align: center;
        }
        .reset-btn { background: #28a745; } 
        .print-btn { background: #9c27b0; } 
        .back-btn { background: #dc3545; } 
        .btn:hover { opacity: 0.8; }

        /* Chart & Table */
        #chart-container { position: relative; width: 100%; margin: 10px auto; }
        
        .table-container { margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; }
        
        /* Tampilan Card Tabel untuk Mobile */
        tr { 
            display: block; 
            background: #fff; 
            border: 1px solid #eee; 
            border-radius: 10px; 
            margin-bottom: 15px; 
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        td { 
            display: flex; 
            justify-content: space-between; 
            padding: 8px 0; 
            border-bottom: 1px solid #f5f5f5;
            font-size: 13px;
            text-align: right;
        }
        td:last-child { border-bottom: none; }
        td:before { 
            content: attr(data-label); 
            font-weight: bold; 
            color: #6a1b9a; 
            text-align: left;
            flex: 1;
        }
        .text-right { font-weight: bold; }
        .clickable { color: #6a1b9a; text-decoration: underline; cursor: pointer; }

        /* Loading & Error */
        #loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .spinner { width: 35px; height: 35px; border: 4px solid #f3f3f3; border-top: 4px solid #6a1b9a; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .error-msg { color: #dc3545; background: #f8d7da; padding: 12px; border-radius: 8px; font-size: 13px; border: 1px solid #f5c6cb; }

        @media print {
            .filter-grid, .button-group, .search-input, .as-of-date { display: none !important; }
            body { background: white; }
            .container { box-shadow: none; border: none; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">
        <h2 id="mainHeader">M-Direct Performance Sumatera</h2>
        <span id="dateDisplay" class="as-of-date"></span>
    </div>
    
    <input type="text" class="search-input" id="SearchInput" placeholder="Search Name or Code..." onkeyup="render()">

    <div class="filter-grid">
        <select id="RankFilter">
            <option value="top10">Top 10 Booking</option>
            <option value="bottom10">Bottom 10 Booking</option>
            <option value="all">Semua Data</option>
        </select>
        <select id="BranchFilter">
            <option value="">All Branch</option>
        </select>
        <select id="OfficeFilter">
            <option value="">All Office</option>
        </select>
        <select id="PositionFilter">
            <option value="">All Position</option>
        </select>
    </div>

    <div class="button-group">
        <button class="btn reset-btn" onclick="resetFilter()">Reset</button>
        <button class="btn print-btn" onclick="window.print()">Print</button>
        <button class="btn back-btn" onclick="openPage()">M-Booking</button>
    </div>

    <div id="loader">
        <div class="spinner"></div>
        <p style="font-size: 12px; color: #666;">Memuat Data...</p>
    </div>

    <div id="error-container"></div>

    <div id="chart-container" style="display:none;"><canvas id="myBarChart"></canvas></div>

    <div class="table-container" id="mainTable" style="display:none;">
        <table id="dataTable">
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
let myChart = null;
let tableData = [];

function getVal(row, keyName) {
    const foundKey = Object.keys(row).find(k => k.trim().toLowerCase() === keyName.trim().toLowerCase());
    return foundKey ? row[foundKey] : "";
}

function cleanNum(val) {
    if (!val) return 0;
    let s = val.toString().replace(/,/g, '').trim();
    return (s === "-" || s === "") ? 0 : parseFloat(s);
}

function formatJt(val) {
    const n = cleanNum(val);
    return n === 0 ? "-" : Math.round(n / 1000000).toLocaleString('id-ID');
}

function clickToFilter(id, val) {
    const el = document.getElementById(id);
    if(el) { el.value = val; el.dispatchEvent(new Event('change')); }
}

document.addEventListener('DOMContentLoaded', () => {
    const today = new Date();
    const diff = (today.getDay() === 1) ? 3 : 1;
    today.setDate(today.getDate() - diff);
    document.getElementById('dateDisplay').innerText = "as of " + today.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
    
    fetch('Dataset.json')
        .then(r => {
            if (!r.ok) throw new Error("Dataset.json gagal dimuat.");
            return r.json();
        })
        .then(data => {
            tableData = data;
            document.getElementById('loader').style.display = 'none';
            document.getElementById('chart-container').style.display = 'block';
            document.getElementById('mainTable').style.display = 'block';
            init();
        })
        .catch(err => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('error-container').innerHTML = `<div class="error-msg">⚠️ ${err.message}</div>`;
        });
});

function init() {
    if (tableData.length === 0) return;
    
    const branches = [...new Set(tableData.map(d => getVal(d, 'Main Branch').trim()))].filter(v => v).sort();
    document.getElementById('BranchFilter').innerHTML = '<option value="">All Branch</option>' + 
        branches.map(v => `<option value="${v}">${v}</option>`).join('');
    
    const positions = [...new Set(tableData.map(d => getVal(d, 'Position') || getVal(d, 'Jabatan')))].filter(v => v).sort();
    document.getElementById('PositionFilter').innerHTML = '<option value="">All Position</option>' + 
        positions.map(v => `<option value="${v}">${v}</option>`).join('');

    document.getElementById('BranchFilter').addEventListener('change', updateOfficeDropdown);
    document.getElementById('OfficeFilter').addEventListener('change', render);
    document.getElementById('RankFilter').addEventListener('change', render);
    document.getElementById('PositionFilter').addEventListener('change', render);
    
    updateOfficeDropdown(); 
}

function updateOfficeDropdown() {
    const bVal = document.getElementById('BranchFilter').value;
    const offices = [...new Set(tableData
        .filter(d => !bVal || getVal(d, 'Main Branch').trim() === bVal)
        .map(d => getVal(d, 'Office').trim())
    )].filter(v => v).sort();

    document.getElementById('OfficeFilter').innerHTML = '<option value="">All Office</option>' + 
        offices.map(v => `<option value="${v}">${v}</option>`).join('');
    render();
}

function render() {
    const bVal = document.getElementById('BranchFilter').value;
    const oVal = document.getElementById('OfficeFilter').value;
    const rVal = document.getElementById('RankFilter').value;
    const pVal = document.getElementById('PositionFilter').value;
    const qVal = document.getElementById('SearchInput').value.toLowerCase();

    let filtered = tableData.filter(d => {
        const name = (getVal(d, 'Name') + getVal(d, 'Marketing Name') + getVal(d, 'NIK')).toLowerCase();
        return (!bVal || getVal(d, 'Main Branch').trim() === bVal) && 
               (!oVal || getVal(d, 'Office').trim() === oVal) &&
               (!pVal || (getVal(d, 'Position') || getVal(d, 'Jabatan')) === pVal) &&
               (!qVal || name.includes(qVal));
    });

    let sortedData = [...filtered].sort((a, b) => cleanNum(getVal(b, 'Total')) - cleanNum(getVal(a, 'Total')));
    
    let finalTableData = sortedData;
    if (rVal === 'top10') finalTableData = sortedData.slice(0, 10);
    else if (rVal === 'bottom10') finalTableData = sortedData.slice(-10).reverse();

    // Chart Data
    let chartLabels = finalTableData.map(d => getVal(d, 'Office').trim().substring(0,10));
    let chartValues = finalTableData.map(d => Math.round(cleanNum(getVal(d, 'Total')) / 1000000));
    let chartDets = finalTableData.map(d => ({
        emas: cleanNum(getVal(d, 'Emas')),
        multi: cleanNum(getVal(d, 'MultiGuna')),
        hajj: cleanNum(getVal(d, 'Prohajj')),
        kpr: cleanNum(getVal(d, 'KPR')),
        non: cleanNum(getVal(d, 'Non Consumer'))
    }));

    draw(chartLabels, chartValues, chartDets);

    // Table Card Render
    document.getElementById('tableBody').innerHTML = finalTableData.map(row => {
        return `<tr>${Object.entries(row).map(([k, v]) => {
            const kc = k.trim().toUpperCase();
            const isNum = ["EMAS", "MULTIGUNA", "PROHAJJ", "KPR", "NON CONSUMER", "TOTAL"].includes(kc);
            let cls = isNum ? 'text-right' : '';
            if(["MAIN BRANCH", "OFFICE"].includes(kc)) cls += ' clickable';
            let clickAction = kc === "MAIN BRANCH" ? `onclick="clickToFilter('BranchFilter','${v}')"` : 
                              kc === "OFFICE" ? `onclick="clickToFilter('OfficeFilter','${v}')"` : "";
            return `<td class="${cls}" data-label="${k.trim()}" ${clickAction}>${isNum ? formatJt(v) : v}</td>`;
        }).join('')}</tr>`;
    }).join('');
}

function draw(labels, data, dets) {
    const ctx = document.getElementById('myBarChart').getContext('2d');
    if(myChart) myChart.destroy();
    document.getElementById('chart-container').style.height = (labels.length * 35 + 50) + "px";
    
    myChart = new Chart(ctx, {
        type: 'bar', 
        plugins: [ChartDataLabels],
        data: { 
            labels, 
            datasets: [{ 
                data, 
                backgroundColor: '#36A2EB', 
                details: dets 
            }] 
        },
        options: {
            indexAxis: 'y', 
            responsive: true, 
            maintainAspectRatio: false,
            scales: { x: { display: false }, y: { grid: { display: false }, ticks: { font: { size: 10 } } } },
            plugins: {
                legend: { display: false },
                datalabels: { anchor: 'end', align: 'right', formatter: v => v + " Jt", font: { size: 10, weight: 'bold' } },
                tooltip: {
                    callbacks: {
                        label: function(c) {
                            const d = c.dataset.details[c.dataIndex];
                            const f = (n) => Math.round(n/1000000).toLocaleString('id-ID') + " Jt";
                            return [`Total: ${c.raw} Jt`, `Emas: ${f(d.emas)}`, `KPR: ${f(d.kpr)}`, `Haji: ${f(d.hajj)}`];
                        }
                    }
                }
            }
        }
    });
}

function resetFilter() { location.reload(); }
function openPage() { window.location.href = 'https://m-direct.vercel.app/'; }
</script>
</body>
</html>
