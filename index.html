<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Performance Region Sumatera</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            background-color: #f0f2f5;
            padding: 20px;
            margin: 0;
        }
        .container {
            width: 95%;
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.08);
        }
        
        #chart-container {
            position: relative;
            width: 100%;
            margin: 20px auto;
            min-height: 300px; 
        }

        h2 {
            color: white;
            background: linear-gradient(90deg, #6a1b9a, #8e24aa);
            padding: 15px;
            border-radius: 8px;
            margin-top: 0;
        }

        .filter-container {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            flex: 1;
            min-width: 150px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            color: white;
        }
        .reset-btn { background: #28a745; }
        .reset-btn:hover { background: #218838; }
        .back-btn { background: #dc3545; }
        .back-btn:hover { background: #c82333; }
        .print-btn { background: #6f42c1; }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        th {
            background-color: #6a1b9a;
            color: white;
            padding: 12px 8px;
            position: sticky;
            top: 0;
            border: 1px solid #5e1689;
        }

        td {
            padding: 10px;
            border: 1px solid #eee;
            text-align: left;
        }
        tr:nth-child(even) { background-color: #f9f9f9; }

        @media screen and (max-width: 768px) {
            .filter-container { flex-direction: column; align-items: stretch; }
            select, .btn { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Booking Performance Region Sumatera</h2>
    
    <div class="filter-container">
        <select id="BranchFilter">
            <option value="">Semua Main Branch</option>
        </select>
        <select id="OfficeFilter">
            <option value="">Semua Office</option>
        </select>
        <select id="ActivityStatusFilter">
            <option value="all">Semua Aktifitas</option>
            <option value="active">Ada Aktifitas</option>
            <option value="inactive">Tidak Ada Aktifitas</option>
        </select>
        
        <button class="btn reset-btn" onclick="resetFilter()">Reset</button>
        <button class="btn print-btn" onclick="printTable()">Print</button>
        <button class="btn back-btn" onclick="openPage()">M-Direct</button>
    </div>

    <div id="chart-container">
        <canvas id="myBarChart"></canvas>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead>
                <tr id="tableHead"></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
const ChartDataLabels = window.ChartDataLabels;
let myChart = null;
let tableData = [];

// --- FUNGSI FIX ANGKA: Menghapus koma ribuan ---
function cleanNumber(val) {
    if (typeof val === 'number') return val;
    if (!val || val === "-" || val === "") return 0;
    let cleaned = val.toString().replace(/,/g, '');
    return parseFloat(cleaned) || 0;
}

document.addEventListener('DOMContentLoaded', () => {
    fetch('Dataset.json')
        .then(res => res.json())
        .then(data => {
            tableData = data;
            initializeDashboard();
        })
        .catch(err => {
            console.error("Gagal load JSON:", err);
        });
});

function initializeDashboard() {
    if (tableData.length === 0) return;

    // Build Table Header
    const columns = Object.keys(tableData[0]);
    document.getElementById('tableHead').innerHTML = columns.map(col => `<th>${col}</th>`).join('');

    // Init Filters
    updateMainFilters();

    // Event Listeners
    document.getElementById('BranchFilter').addEventListener('change', (e) => {
        updateOfficeFilter(e.target.value);
        filterAndRender();
    });
    document.getElementById('OfficeFilter').addEventListener('change', filterAndRender);
    document.getElementById('ActivityStatusFilter').addEventListener('change', filterAndRender);
    
    filterAndRender();
}

function updateMainFilters() {
    const branches = [...new Set(tableData.map(d => d['Main Branch']))].sort();
    const branchSelect = document.getElementById('BranchFilter');
    branchSelect.innerHTML = '<option value="">Semua Main Branch</option>' + 
        branches.map(v => `<option value="${v}">${v}</option>`).join('');
    
    updateOfficeFilter("");
}

function updateOfficeFilter(branch) {
    const officeSelect = document.getElementById('OfficeFilter');
    const filteredData = tableData.filter(d => !branch || d['Main Branch'] === branch);
    const offices = [...new Set(filteredData.map(d => d['Office']))].sort();
    
    officeSelect.innerHTML = '<option value="">Semua Office</option>' + 
        offices.map(v => `<option value="${v}">${v}</option>`).join('');
}

function filterAndRender() {
    const branchVal = document.getElementById('BranchFilter').value;
    const officeVal = document.getElementById('OfficeFilter').value;
    const statusVal = document.getElementById('ActivityStatusFilter').value;

    const filtered = tableData.filter(row => {
        const matchBranch = !branchVal || row['Main Branch'] === branchVal;
        const matchOffice = !officeVal || row['Office'] === officeVal;
        const totalNum = cleanNumber(row['Total']);
        const matchStatus = statusVal === 'all' || 
                           (statusVal === 'active' && totalNum > 0) || 
                           (statusVal === 'inactive' && totalNum === 0);
        return matchBranch && matchOffice && matchStatus;
    });

    // Update Chart
    const officeMap = {};
    filtered.forEach(row => {
        const val = cleanNumber(row['Total']);
        officeMap[row['Office']] = (officeMap[row['Office']] || 0) + val;
    });

    let entries = Object.entries(officeMap).sort((a, b) => b[1] - a[1]);
    let labels = entries.map(e => e[0]);
    let values = entries.map(e => e[1]);

    if (branchVal && values.length > 0) {
        labels.unshift("TOTAL " + branchVal);
        values.unshift(values.reduce((a, b) => a + b, 0));
    }

    drawChart(labels, values);
    
    // Update Table
    document.getElementById('tableBody').innerHTML = filtered.map(row => 
        `<tr>${Object.values(row).map(v => `<td>${v}</td>`).join('')}</tr>`
    ).join('');
}

function drawChart(labels, values) {
    const ctx = document.getElementById('myBarChart').getContext('2d');
    if (myChart) myChart.destroy();

    document.getElementById('chart-container').style.height = (labels.length * 40 + 120) + "px";

    myChart = new Chart(ctx, {
        type: 'bar',
        plugins: [ChartDataLabels],
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: labels.map(l => l.includes('TOTAL') ? '#4E337E' : '#36A2EB'),
                barPercentage: 0.7
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { right: 150 } },
            scales: { x: { display: false }, y: { grid: { display: false } } },
            plugins: {
                legend: { display: false },
                datalabels: {
                    anchor: 'end', align: 'right', offset: 10, color: '#000',
                    font: { weight: 'bold' },
                    formatter: (v) => v.toLocaleString('id-ID')
                }
            }
        }
    });
}

function resetFilter() {
    document.getElementById('BranchFilter').value = "";
    document.getElementById('ActivityStatusFilter').value = "all";
    updateOfficeFilter("");
    filterAndRender();
}

function printTable() { window.print(); }
function openPage() { window.location.href = 'https://m-direct.vercel.app/'; }
</script>
</body>
</html>
