<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Performance Region Sumatera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; margin: 0; }
        .container { width: 95%; max-width: 1200px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.08); }
        #chart-container { position: relative; width: 100%; margin: 20px auto; min-height: 400px; }
        h2 { color: white; background: linear-gradient(90deg, #6a1b9a, #8e24aa); padding: 15px; border-radius: 8px; margin-top: 0; }
        .filter-container { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; padding: 20px; background: #f8f9fa; border-radius: 10px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; flex: 1; min-width: 150px; }
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; }
        .reset-btn { background: #28a745; }
        .back-btn { background: #dc3545; }
        .print-btn { background: #6f42c1; }
        .table-container { overflow-x: auto; margin-top: 20px; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background-color: #6a1b9a; color: white; padding: 12px 8px; position: sticky; top: 0; border: 1px solid #5e1689; }
        td { padding: 10px; border: 1px solid #eee; text-align: left; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <h2>Booking Performance Region Sumatera - April 2026</h2>
    <div class="filter-container">
        <select id="BranchFilter"><option value="">Semua Main Branch</option></select>
        <select id="OfficeFilter"><option value="">Semua Office</option></select>
        <select id="ActivityStatusFilter">
            <option value="all">Semua Aktifitas</option>
            <option value="active">Ada Aktifitas</option>
            <option value="inactive">Tidak Ada Aktifitas</option>
        </select>
        <button class="btn reset-btn" onclick="resetFilter()">Reset</button>
        <button class="btn print-btn" onclick="printTable()">Print</button>
        <button class="btn back-btn" onclick="openPage()">M-Direct</button>
    </div>

    <div id="chart-container">
        <canvas id="myBarChart"></canvas>
    </div>

    <div class="table-container">
        <table id="dataTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
const ChartDataLabels = window.ChartDataLabels;
let myChart = null;
let tableData = [];

// --- PERBAIKAN LOGIKA ANGKA ---
function cleanNumber(val) {
    if (typeof val === 'number') return val;
    if (!val || val === "-" || val === "") return 0;
    
    let str = val.toString().trim();
    
    // Jika formatnya 1.165.595 (titik sebagai ribuan)
    // Kita hilangkan semua titik agar menjadi 1165595
    if (str.includes('.') && str.includes(',')) {
        // Format Internasional dengan koma desimal: 1.165.595,00
        str = str.replace(/\./g, '').replace(',', '.');
    } else if (str.includes('.') && !str.includes(',')) {
        // Asumsi titik adalah ribuan jika digit di belakang titik ada 3
        const parts = str.split('.');
        if (parts[parts.length - 1].length === 3) {
            str = str.replace(/\./g, '');
        }
    }
    
    return parseFloat(str) || 0;
}

document.addEventListener('DOMContentLoaded', function() {
    fetch('Dataset.json')
        .then(res => res.json())
        .then(data => {
            tableData = data;
            initializeDashboard();
        })
        .catch(() => {
            // Contoh data untuk simulasi 2.2M
            tableData = [
                {"Main Branch": "BENGKULU", "Office": "JAMBI", "Total": "1.165.595"},
                {"Main Branch": "BENGKULU", "Office": "KCP CURUP", "Total": "1.100.000"}, // Tambahan agar jadi 2.2M
                {"Main Branch": "BENGKULU", "Office": "KCP MUARA BUNGO", "Total": "328.064"}
            ];
            initializeDashboard();
        });
});

function initializeDashboard() {
    if (tableData.length > 0) {
        const columns = Object.keys(tableData[0]);
        document.getElementById('tableHead').innerHTML = columns.map(col => `<th>${col}</th>`).join('');
        
        const branches = [...new Set(tableData.map(d => d['Main Branch']))];
        const branchSelect = document.getElementById('BranchFilter');
        branchSelect.innerHTML = '<option value="">Semua Main Branch</option>' + 
            branches.sort().map(b => `<option value="${b}">${b}</option>`).join('');
    }
    
    document.querySelectorAll('select').forEach(s => s.addEventListener('change', filterData));
    filterData();
}

function filterData() {
    const branchVal = document.getElementById('BranchFilter').value;
    const officeVal = document.getElementById('OfficeFilter').value;
    const statusVal = document.getElementById('ActivityStatusFilter').value;

    const filtered = tableData.filter(row => {
        const matchBranch = !branchVal || row['Main Branch'] === branchVal;
        const matchOffice = !officeVal || row['Office'] === officeVal;
        const total = cleanNumber(row['Total']);
        const matchStatus = statusVal === 'all' || (statusVal === 'active' && total > 0) || (statusVal === 'inactive' && total === 0);
        return matchBranch && matchOffice && matchStatus;
    });

    renderChart(filtered, branchVal);
    renderTable(filtered);
}

function renderChart(data, branchVal) {
    const officeMap = {};
    data.forEach(row => {
        const val = cleanNumber(row['Total']);
        officeMap[row['Office']] = (officeMap[row['Office']] || 0) + val;
    });

    let entries = Object.entries(officeMap).sort((a, b) => b[1] - a[1]);
    let labels = entries.map(e => e[0]);
    let values = entries.map(e => e[1]);

    if (branchVal) {
        const total = values.reduce((a, b) => a + b, 0);
        labels.unshift("TOTAL " + branchVal);
        values.unshift(total);
    }

    const ctx = document.getElementById('myBarChart').getContext('2d');
    if (myChart) myChart.destroy();

    document.getElementById('chart-container').style.height = (labels.length * 40 + 100) + "px";

    myChart = new Chart(ctx, {
        type: 'bar',
        plugins: [ChartDataLabels],
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: labels.map(l => l.startsWith('TOTAL') ? '#4E337E' : '#36A2EB'),
                barPercentage: 0.8
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { right: 120 } }, // RUANG AGAR ANGKA TIDAK TERPOTONG
            scales: { x: { display: false }, y: { grid: { display: false } } },
            plugins: {
                legend: { display: false },
                datalabels: {
                    anchor: 'end',
                    align: 'right',
                    offset: 10, // JARAK ANGKA DARI BAR
                    color: '#000',
                    font: { weight: 'bold' },
                    formatter: (v) => v.toLocaleString('id-ID')
                }
            }
        }
    });
}

function renderTable(data) {
    document.getElementById('tableBody').innerHTML = data.map(row => 
        `<tr>${Object.values(row).map(v => `<td>${v}</td>`).join('')}</tr>`
    ).join('');
}

function resetFilter() {
    document.getElementById('BranchFilter').value = "";
    document.getElementById('OfficeFilter').value = "";
    document.getElementById('ActivityStatusFilter').value = "all";
    filterData();
}

function printTable() { window.print(); }
function openPage() { window.location.href = 'https://m-direct.vercel.app/'; }
</script>
</body>
</html>
