<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Booking Performance Region Sumatera</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #f0f2f5; padding: 10px; margin: 0; }
        .container { width: 100%; max-width: 1300px; margin: 0 auto; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.08); box-sizing: border-box; }
        
        .header-title { 
            color: white; 
            background: linear-gradient(90deg, #6a1b9a, #8e24aa); 
            padding: 10px; 
            border-radius: 8px; 
            margin-bottom: 15px;
        }
        .header-title h2 { margin: 0; font-size: 18px; font-weight: bold; }
        .as-of-date { font-size: 11px; opacity: 0.9; display: block; margin-top: 3px; }
        
        .filter-container { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; padding: 12px; background: #f8f9fa; border-radius: 10px; margin-bottom: 15px; border: 1px solid #e9ecef; }
        select { padding: 8px; border: 1px solid #ddd; border-radius: 6px; outline: none; flex: 1; min-width: 140px; font-size: 13px; }
        
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; font-size: 12px; }
        .reset-btn { background: #28a745; }
        .back-btn { background: #dc3545; }
        .btn:hover { opacity: 0.8; }

        #chart-container { position: relative; width: 100%; margin: 10px auto; min-height: 250px; }

        /* TABEL DESKTOP */
        .table-container { margin-top: 15px; border-radius: 8px; overflow: hidden; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background-color: #6a1b9a; color: white; padding: 10px 5px; border: 1px solid #5e1689; }
        td { padding: 8px; border: 1px solid #eee; text-align: left; }
        td.clickable { color: #6a1b9a; cursor: pointer; text-decoration: underline; font-weight: 600; }
        .text-right { text-align: right; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        /* RESPONSIVE SMARTPHONE (MOBILE) - SUPER RAPAT */
        @media screen and (max-width: 768px) {
            .container { padding: 8px; }
            .filter-container { flex-direction: column; align-items: stretch; gap: 6px; }
            select, .btn { width: 100%; }

            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            
            tr { border: 1px solid #ddd; margin-bottom: 8px; border-radius: 6px; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }

            td { 
                border: none; border-bottom: 1px solid #f0f0f0; position: relative; 
                padding: 6px 10px 6px 45% !important; 
                text-align: right !important; font-size: 12px; line-height: 1.3;
                min-height: 32px; box-sizing: border-box;
            }

            td:last-child { border-bottom: none; }
            
            /* Label Default */
            td:before { 
                content: attr(data-label); position: absolute; left: 10px; width: 40%; 
                font-weight: bold; color: #6a1b9a; text-align: left; white-space: nowrap;
                top: 50%; transform: translateY(-50%);
            }

            /* Efek Indentasi khusus Produk Consumer di Mobile */
            td.indent-label:before {
                left: 25px; /* Teks label menjorok ke dalam */
                font-weight: normal;
                color: #555;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">
        <h2 id="mainHeader">Booking Performance</h2>
        <span id="dateDisplay" class="as-of-date"></span>
    </div>
    
    <div class="filter-container">
        <select id="BranchFilter"><option value="">Semua Main Branch</option></select>
        <select id="OfficeFilter"><option value="">Semua Office</option></select>
        <select id="RankFilter">
            <option value="top10">Top 10 Booking</option>
            <option value="bottom10">Bottom 10 Booking</option>
            <option value="all">Semua Data</option>
        </select>
        <button class="btn reset-btn" onclick="resetFilter()">Reset</button>
        <button class="btn back-btn" onclick="openPage()">M-Direct</button>
    </div>

    <div id="chart-container"><canvas id="myBarChart"></canvas></div>

    <div class="table-container">
        <table id="dataTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
let myChart = null;
let tableData = [];

function cleanNumber(val) {
    if (typeof val === 'number') return val;
    if (!val) return 0;
    let cleaned = val.toString().trim().replace(/,/g, '');
    if (cleaned === "-" || cleaned === "") return 0;
    return parseFloat(cleaned) || 0;
}

function getValue(row, targetName) {
    const key = Object.keys(row).find(k => 
        k.toLowerCase().trim().replace(/\s/g, '') === targetName.toLowerCase().replace(/\s/g, '')
    );
    return cleanNumber(row[key]);
}

function formatJutaan(val) {
    const num = cleanNumber(val);
    return num === 0 ? "-" : Math.round(num / 1000000).toLocaleString('id-ID');
}

function clickToFilter(filterId, value) {
    const filterElem = document.getElementById(filterId);
    filterElem.value = value;
    filterElem.dispatchEvent(new Event('change'));
}

document.addEventListener('DOMContentLoaded', () => {
    // LOGIKA TANGGAL: Senin -> -3 hari, lainnya -> -1 hari
    const today = new Date();
    const dayName = today.getDay(); // 0=Minggu, 1=Senin...
    const diff = (dayName === 1) ? 3 : 1;
    today.setDate(today.getDate() - diff);
    
    document.getElementById('dateDisplay').innerText = "as of " + today.toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'});
    
    fetch('Dataset.json')
        .then(res => res.json())
        .then(data => {
            tableData = data;
            initializeDashboard();
        }).catch(err => console.error("Error loading JSON:", err));
});

function initializeDashboard() {
    if (tableData.length === 0) return;
    const columns = Object.keys(tableData[0]);
    document.getElementById('tableHead').innerHTML = columns.map(col => `<th>${col}</th>`).join('');
    
    const branches = [...new Set(tableData.map(d => d['Main Branch']))].sort();
    document.getElementById('BranchFilter').innerHTML = '<option value="">Semua Main Branch</option>' + branches.map(v => `<option value="${v}">${v}</option>`).join('');
    
    document.getElementById('BranchFilter').addEventListener('change', (e) => {
        const branch = e.target.value;
        const offices = [...new Set(tableData.filter(d => !branch || d['Main Branch'] === branch).map(d => d['Office']))].sort();
        document.getElementById('OfficeFilter').innerHTML = '<option value="">Semua Office</option>' + offices.map(v => `<option value="${v}">${v}</option>`).join('');
        filterAndRender();
    });
    
    document.getElementById('OfficeFilter').addEventListener('change', filterAndRender);
    document.getElementById('RankFilter').addEventListener('change', filterAndRender);
    filterAndRender();
}

function filterAndRender() {
    const branchVal = document.getElementById('BranchFilter').value;
    const officeVal = document.getElementById('OfficeFilter').value;
    const rankVal = document.getElementById('RankFilter').value;

    let filtered = tableData.filter(row => {
        return (!branchVal || row['Main Branch'] === branchVal) && (!officeVal || row['Office'] === officeVal);
    });

    const officeMap = {};
    const breakdownMap = {};

    filtered.forEach(row => {
        const off = row['Office'];
        const totalVal = getValue(row, 'Total');
        officeMap[off] = (officeMap[off] || 0) + totalVal;
        if(!breakdownMap[off]) breakdownMap[off] = { emas: 0, multiguna: 0, prohajj: 0, kpr: 0, nonCon: 0 };
        breakdownMap[off].emas += getValue(row, 'Emas');
        breakdownMap[off].multiguna += getValue(row, 'MultiGuna');
        breakdownMap[off].prohajj += getValue(row, 'Prohajj');
        breakdownMap[off].kpr += getValue(row, 'KPR');
        breakdownMap[off].nonCon += getValue(row, 'Non Consumer');
    });

    let sortedEntries = Object.entries(officeMap).sort((a, b) => b[1] - a[1]);
    if (rankVal === 'top10') sortedEntries = sortedEntries.slice(0, 10);
    else if (rankVal === 'bottom10') sortedEntries = sortedEntries.slice(-10).reverse();

    let chartLabels = sortedEntries.map(e => e[0]);
    let chartValues = sortedEntries.map(e => Math.round(e[1] / 1000000));
    let chartDetails = sortedEntries.map(e => breakdownMap[e[0]]);

    // Total Sumatera
    const regTotal = tableData.reduce((acc, curr) => acc + getValue(curr, 'Total'), 0);
    const regDetails = {
        emas: tableData.reduce((acc, curr) => acc + getValue(curr, 'Emas'), 0),
        multiguna: tableData.reduce((acc, curr) => acc + getValue(curr, 'MultiGuna'), 0),
        prohajj: tableData.reduce((acc, curr) => acc + getValue(curr, 'Prohajj'), 0),
        kpr: tableData.reduce((acc, curr) => acc + getValue(curr, 'KPR'), 0),
        nonCon: tableData.reduce((acc, curr) => acc + getValue(curr, 'Non Consumer'), 0)
    };
    chartLabels.unshift("TOTAL REGION SUMATERA");
    chartValues.unshift(Math.round(regTotal / 1000000));
    chartDetails.unshift(regDetails);

    // Total Main Branch
    if (branchVal && !officeVal) {
        const branchData = tableData.filter(d => d['Main Branch'] === branchVal);
        const branchTotal = branchData.reduce((acc, curr) => acc + getValue(curr, 'Total'), 0);
        const branchDetails = {
            emas: branchData.reduce((acc, curr) => acc + getValue(curr, 'Emas'), 0),
            multiguna: branchData.reduce((acc, curr) => acc + getValue(curr, 'MultiGuna'), 0),
            prohajj: branchData.reduce((acc, curr) => acc + getValue(curr, 'Prohajj'), 0),
            kpr: branchData.reduce((acc, curr) => acc + getValue(curr, 'KPR'), 0),
            nonCon: branchData.reduce((acc, curr) => acc + getValue(curr, 'Non Consumer'), 0)
        };
        chartLabels.splice(1, 0, "TOTAL " + branchVal.toUpperCase());
        chartValues.splice(1, 0, Math.round(branchTotal / 1000000));
        chartDetails.splice(1, 0, branchDetails);
    }

    drawChart(chartLabels, chartValues, chartDetails);

    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = filtered.map(row => {
        return `<tr>${Object.entries(row).map(([key, val]) => {
            const keyUpper = key.toUpperCase().trim();
            const isNum = ["TOTAL", "EMAS", "MULTIGUNA", "PROHAJJ", "KPR", "NON CONSUMER"].includes(keyUpper);
            const isProduct = ["EMAS", "MULTIGUNA", "PROHAJJ", "KPR", "NON CONSUMER"].includes(keyUpper);
            
            const display = isNum ? formatJutaan(val) : val;
            let cls = isNum ? 'text-right' : (key==='Main Branch'||key==='Office'?'clickable':'');
            
            // Tambahkan class indent untuk baris produk di mobile
            if (isProduct) cls += ' indent-label';

            let attr = key === 'Main Branch' ? `onclick="clickToFilter('BranchFilter', '${val}')"` : (key === 'Office' ? `onclick="clickToFilter('OfficeFilter', '${val}')"` : '');
            return `<td class="${cls}" ${attr} data-label="${key}">${display}</td>`;
        }).join('')}</tr>`;
    }).join('');
}

function drawChart(labels, values, details) {
    const ctx = document.getElementById('myBarChart').getContext('2d');
    if (myChart) myChart.destroy();
    document.getElementById('chart-container').style.height = (labels.length * 35 + 80) + "px";

    myChart = new Chart(ctx, {
        type: 'bar',
        plugins: [ChartDataLabels],
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: labels.map(l => l.includes('TOTAL') ? '#2E1A47' : '#36A2EB'),
                barPercentage: 0.7,
                details: details
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { right: 80 } },
            scales: { x: { display: false }, y: { grid: { display: false }, ticks: { font: { size: 11 } } } },
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(ctx) {
                            const d = ctx.dataset.details[ctx.dataIndex];
                            const f = (n) => Math.round(n/1000000).toLocaleString('id-ID') + " Jt";
                            return [`Total: ${ctx.raw} Jt`, `Emas: ${f(d.emas)}`, `Multiguna: ${f(d.multiguna)}`, `Prohajj: ${f(d.prohajj)}`, `KPR: ${f(d.kpr)}`, `Non Consumer: ${f(d.nonCon)}`];
                        }
                    }
                },
                datalabels: {
                    anchor: 'end', align: 'right', offset: 5, font: { weight: 'bold', size: 11 },
                    formatter: (v) => v.toLocaleString('id-ID') + " Jt"
                }
            }
        }
    });
}

function resetFilter() { location.reload(); }
function openPage() { window.location.href = 'https://m-direct.vercel.app/'; }
</script>
</body>
</html>
