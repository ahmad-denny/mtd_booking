<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Booking Performance Region Sumatera</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; margin: 0; }
        .container { width: 95%; max-width: 1300px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.08); }
        
        .header-title { 
            color: white; 
            background: linear-gradient(90deg, #6a1b9a, #8e24aa); 
            padding: 20px; 
            border-radius: 8px; 
            margin-top: 0;
            margin-bottom: 20px;
        }
        .header-title h2 { margin: 0; font-size: 24px; font-weight: bold; }
        .as-of-date { font-size: 14px; opacity: 0.9; font-weight: normal; display: block; margin-top: 8px; }
        
        .filter-container { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; padding: 20px; background: #f8f9fa; border-radius: 10px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        select { padding: 10px; border: 1px solid #ddd; border-radius: 6px; outline: none; flex: 1; min-width: 150px; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; color: white; }
        .reset-btn { background: #28a745; }
        .back-btn { background: #dc3545; }
        .print-btn { background: #6f42c1; }
        .export-btn { background: #f39c12; }
        .btn:hover { opacity: 0.8; }

        #chart-container { position: relative; width: 100%; margin: 20px auto; min-height: 300px; }

        .table-container { overflow-x: auto; margin-top: 20px; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
        th { background-color: #6a1b9a; color: white; padding: 12px 8px; position: sticky; top: 0; border: 1px solid #5e1689; word-wrap: break-word; }
        td { padding: 10px; border: 1px solid #eee; text-align: left; word-wrap: break-word; }
        
        td.clickable { color: #6a1b9a; cursor: pointer; text-decoration: underline; font-weight: 500; }
        td.clickable:hover { background-color: #f3e5f5; color: #8e24aa; }

        .text-right { text-align: right; font-family: 'Segoe UI', sans-serif; font-weight: bold; }
        tr:nth-child(even) { background-color: #f9f9f9; }

        th:nth-child(1), th:nth-child(2) { width: 15%; } 

        @media screen and (max-width: 768px) { .filter-container { flex-direction: column; align-items: stretch; } select, .btn { width: 100%; } table { table-layout: auto; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-title">
        <h2 id="mainHeader">Booking Performance</h2>
        <span id="dateDisplay" class="as-of-date"></span>
    </div>
    
    <div class="filter-container">
        <select id="BranchFilter"><option value="">Semua Main Branch</option></select>
        <select id="OfficeFilter"><option value="">Semua Office</option></select>
        
        <select id="RankFilter">
            <option value="top10">Top 10 Booking</option>
            <option value="bottom10">Bottom 10 Booking</option>
            <option value="all">Semua Data</option>
        </select>
        
        <button class="btn reset-btn" onclick="resetFilter()">Reset</button>
        <button class="btn print-btn" onclick="printTable()">Print</button>
        <button class="btn export-btn" onclick="exportToExcel()">Export XLS</button>
        <button class="btn back-btn" onclick="openPage()">&#8594 M-Direct</button>
    </div>

    <div id="chart-container"><canvas id="myBarChart"></canvas></div>

    <div class="table-container">
        <table id="dataTable">
            <thead><tr id="tableHead"></tr></thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
const ChartDataLabels = window.ChartDataLabels;
let myChart = null;
let tableData = [];

function getAsOfDate() {
    const today = new Date();
    const dayOfWeek = today.getDay();
    let subDays = (dayOfWeek === 1) ? 3 : 1;
    today.setDate(today.getDate() - subDays);
    const options = { day: 'numeric', month: 'long', year: 'numeric' };
    return "as of " + today.toLocaleDateString('id-ID', options);
}

document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('dateDisplay').innerText = getAsOfDate();
    fetch('Dataset.json')
        .then(res => res.json())
        .then(data => {
            tableData = data;
            initializeDashboard();
        })
        .catch(err => console.error("Gagal load JSON:", err));
});

// Perbaikan fungsi pembersih angka (Handling spasi dan strip dari JSON)
function cleanNumber(val) {
    if (typeof val === 'number') return val;
    if (!val) return 0;
    
    let cleaned = val.toString().trim().replace(/,/g, '');
    if (cleaned === "-" || cleaned === "") return 0;
    
    return parseFloat(cleaned) || 0;
}

function formatJutaan(val) {
    const num = cleanNumber(val);
    if (num === 0) return "-";
    const jutaan = Math.round(num / 1000000);
    return jutaan.toLocaleString('id-ID');
}

function initializeDashboard() {
    if (tableData.length === 0) return;
    const columns = Object.keys(tableData[0]);
    document.getElementById('tableHead').innerHTML = columns.map(col => `<th>${col}</th>`).join('');
    updateMainFilters();
    
    document.getElementById('BranchFilter').addEventListener('change', (e) => {
        updateOfficeFilter(e.target.value);
        filterAndRender();
    });
    document.getElementById('OfficeFilter').addEventListener('change', filterAndRender);
    document.getElementById('RankFilter').addEventListener('change', filterAndRender);
    filterAndRender();
}

function updateMainFilters() {
    const branches = [...new Set(tableData.map(d => d['Main Branch']))].sort();
    const branchSelect = document.getElementById('BranchFilter');
    branchSelect.innerHTML = '<option value="">Semua Main Branch</option>' + 
        branches.map(v => `<option value="${v}">${v}</option>`).join('');
    
    const allOffices = [...new Set(tableData.map(d => d['Office']))].sort();
    const officeSelect = document.getElementById('OfficeFilter');
    officeSelect.innerHTML = '<option value="">Semua Office</option>' + 
        allOffices.map(v => `<option value="${v}">${v}</option>`).join('');
}

function updateOfficeFilter(branch) {
    const officeSelect = document.getElementById('OfficeFilter');
    const filteredData = !branch ? tableData : tableData.filter(d => d['Main Branch'] === branch);
    const offices = [...new Set(filteredData.map(d => d['Office']))].sort();
    officeSelect.innerHTML = '<option value="">Semua Office</option>' + 
        offices.map(v => `<option value="${v}">${v}</option>`).join('');
}

function clickToFilter(filterId, value) {
    const filterElem = document.getElementById(filterId);
    if (filterElem) {
        filterElem.value = value;
        if (filterId === 'BranchFilter') updateOfficeFilter(value);
        filterAndRender();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
}

function filterAndRender() {
    const branchVal = document.getElementById('BranchFilter').value;
    const officeVal = document.getElementById('OfficeFilter').value;
    const rankVal = document.getElementById('RankFilter').value;
    const headerElem = document.getElementById('mainHeader');

    let filtered = tableData.filter(row => {
        const matchBranch = !branchVal || row['Main Branch'] === branchVal;
        const matchOffice = !officeVal || row['Office'] === officeVal;
        return matchBranch && matchOffice;
    });

    const officeMap = {};
    const breakdownMap = {};

    // Fungsi pembantu untuk mencari nilai kolom secara fleksibel
    const getValue = (row, targetName) => {
        const key = Object.keys(row).find(k => 
            k.toLowerCase().trim().replace(/\s/g, '') === targetName.toLowerCase().replace(/\s/g, '')
        );
        return cleanNumber(row[key]);
    };

    filtered.forEach(row => {
        const office = row['Office'];
        const val = getValue(row, 'Total');
        officeMap[office] = (officeMap[office] || 0) + val;

        if(!breakdownMap[office]) {
            breakdownMap[office] = { emas: 0, multiguna: 0, prohajj: 0, kpr: 0, nonCon: 0 };
        }
        
        // Menggunakan pencarian fleksibel agar tidak nol lagi
        breakdownMap[office].emas += getValue(row, 'Emas');
        breakdownMap[office].multiguna += getValue(row, 'MultiGuna');
        breakdownMap[office].prohajj += getValue(row, 'Prohajj');
        breakdownMap[office].kpr += getValue(row, 'KPR');
        breakdownMap[office].nonCon += getValue(row, 'Non Consumer');
    });

    let sortedEntries = Object.entries(officeMap).sort((a, b) => b[1] - a[1]);

    if (rankVal === 'top10') {
        sortedEntries = sortedEntries.slice(0, 10);
    } else if (rankVal === 'bottom10') {
        sortedEntries = sortedEntries.slice(-10).reverse();
    }

    let chartLabels = sortedEntries.map(e => e[0]);
    let chartValues = sortedEntries.map(e => Math.round(e[1] / 1000000));
    let chartDetails = sortedEntries.map(e => breakdownMap[e[0]]);

    // Kalkulasi Total Sumatera secara fleksibel
    const sumateraBreakdown = {
        emas: tableData.reduce((acc, curr) => acc + getValue(curr, 'Emas'), 0),
        multiguna: tableData.reduce((acc, curr) => acc + getValue(curr, 'MultiGuna'), 0),
        prohajj: tableData.reduce((acc, curr) => acc + getValue(curr, 'Prohajj'), 0),
        kpr: tableData.reduce((acc, curr) => acc + getValue(curr, 'KPR'), 0),
        nonCon: tableData.reduce((acc, curr) => acc + getValue(curr, 'Non Consumer'), 0)
    };
    const totalSumatera = tableData.reduce((acc, curr) => acc + getValue(curr, 'Total'), 0);

    chartLabels.unshift("TOTAL REGION SUMATERA");
    chartValues.unshift(Math.round(totalSumatera / 1000000));
    chartDetails.unshift(sumateraBreakdown);

    if (branchVal && !officeVal) {
        const branchBreakdown = {
            emas: filtered.reduce((acc, curr) => acc + getValue(curr, 'Emas'), 0),
            multiguna: filtered.reduce((acc, curr) => acc + getValue(curr, 'MultiGuna'), 0),
            prohajj: filtered.reduce((acc, curr) => acc + getValue(curr, 'Prohajj'), 0),
            kpr: filtered.reduce((acc, curr) => acc + getValue(curr, 'KPR'), 0),
            nonCon: filtered.reduce((acc, curr) => acc + getValue(curr, 'Non Consumer'), 0)
        };
        const branchTotalVal = filtered.reduce((acc, curr) => acc + getValue(curr, 'Total'), 0);
        chartLabels.splice(1, 0, "TOTAL " + branchVal.toUpperCase());
        chartValues.splice(1, 0, Math.round(branchTotalVal / 1000000));
        chartDetails.splice(1, 0, branchBreakdown);
    }

    drawChart(chartLabels, chartValues, chartDetails);

    // Update Header Text
    let dynamicTitle = (rankVal === 'all' ? '' : (rankVal === 'top10' ? 'Top 10 ' : 'Bottom 10 ')) + "Booking Performance";
    if (!branchVal && !officeVal) dynamicTitle += " Region Sumatera";
    else if (branchVal && !officeVal) dynamicTitle += " " + branchVal;
    else if (!branchVal && officeVal) dynamicTitle += " " + officeVal;
    else dynamicTitle += " " + branchVal + " - " + officeVal;
    headerElem.innerText = dynamicTitle;

    // Update Table
    const tableBody = document.getElementById('tableBody');
    tableBody.innerHTML = filtered.map(row => {
        let cells = Object.entries(row).map(([key, val]) => {
            const k = key.toUpperCase().trim();
            const isNumber = ["TOTAL", "EMAS", "MULTIGUNA", "PROHAJJ", "KPR", "NON CONSUMER"].includes(k);
            if (key === "Main Branch") return `<td class="clickable" onclick="clickToFilter('BranchFilter', '${val}')">${val}</td>`;
            if (key === "Office") return `<td class="clickable" onclick="clickToFilter('OfficeFilter', '${val}')">${val}</td>`;
            return isNumber ? `<td class="text-right">${formatJutaan(val)}</td>` : `<td>${val}</td>`;
        }).join('');
        return `<tr>${cells}</tr>`;
    }).join('');
}

function drawChart(labels, values, details) {
    const ctx = document.getElementById('myBarChart').getContext('2d');
    if (myChart) myChart.destroy();
    
    const chartHeight = labels.length > 20 ? labels.length * 30 : labels.length * 45 + 100;
    document.getElementById('chart-container').style.height = chartHeight + "px";

    myChart = new Chart(ctx, {
        type: 'bar',
        plugins: [ChartDataLabels],
        data: {
            labels: labels,
            datasets: [{
                data: values,
                backgroundColor: labels.map(l => l.includes('TOTAL') ? '#2E1A47' : '#36A2EB'),
                barPercentage: 0.7,
                details: details
            }]
        },
        options: {
            indexAxis: 'y',
            responsive: true,
            maintainAspectRatio: false,
            layout: { padding: { right: 100 } },
            scales: { 
                x: { display: false }, 
                y: { 
                    grid: { display: false },
                    ticks: {
                        font: (context) => ({
                            weight: context.tick.label.toString().includes('TOTAL') ? 'bold' : 'normal',
                            size: 12
                        })
                    }
                } 
            },
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: 'rgba(0, 0, 0, 0.85)',
                    padding: 15,
                    titleFont: { size: 14, weight: 'bold' },
                    bodyFont: { size: 13 },
                    callbacks: {
                        label: function(context) {
                            const idx = context.dataIndex;
                            const d = context.dataset.details[idx];
                            const fmt = (num) => Math.round(num / 1000000).toLocaleString('id-ID');
                            
                            // Baris-baris tooltip
                            return [
                                `Total: ${context.raw.toLocaleString('id-ID')} Jt`,
                                `--------------------------------`,
                                `Emas: ${fmt(d.emas)} Jt`,
                                `Multiguna: ${fmt(d.multiguna)} Jt`,
                                `Prohajj: ${fmt(d.prohajj)} Jt`,
                                `KPR: ${fmt(d.kpr)} Jt`,
                                `Non Consumer: ${fmt(d.nonCon)} Jt`
                            ];
                        }
                    }
                },
                datalabels: {
                    anchor: 'end', align: 'right', offset: 5, color: '#000',
                    font: (context) => {
                        const isTotal = context.chart.data.labels[context.dataIndex].toString().includes('TOTAL');
                        return { weight: isTotal ? 'bold' : 'normal', size: isTotal ? 13 : 11 };
                    },
                    formatter: (v) => v.toLocaleString('id-ID') + " Jt"
                }
            }
        }
    });
}

async function exportToExcel() {
    const workbook = new ExcelJS.Workbook();
    const worksheet = workbook.addWorksheet('Booking Performance');
    const table = document.getElementById("dataTable");
    const headerRow = Array.from(table.tHead.rows[0].cells).map(cell => cell.innerText);
    const excelHeader = worksheet.addRow(headerRow);

    excelHeader.eachCell((cell) => {
        cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF6A1B9A' } };
        cell.font = { bold: true, color: { argb: 'FFFFFFFF' } };
        cell.alignment = { vertical: 'middle', horizontal: 'center' };
        cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
    });

    const bodyRows = Array.from(table.tBodies[0].rows);
    bodyRows.forEach(row => {
        const rowData = Array.from(row.cells).map(cell => cell.innerText);
        const newRow = worksheet.addRow(rowData);
        newRow.eachCell((cell, colNumber) => {
            cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
            if (colNumber > 2) cell.alignment = { horizontal: 'right' };
        });
    });

    worksheet.columns.forEach(column => {
        let maxLen = 0;
        column.eachCell({ includeEmpty: true }, (cell) => {
            const len = cell.value ? cell.value.toString().length : 10;
            if (len > maxLen) maxLen = len;
        });
        column.width = maxLen + 5;
    });

    const buffer = await workbook.xlsx.writeBuffer();
    saveAs(new Blob([buffer]), `Booking_Performance.xlsx`);
}

function resetFilter() {
    document.getElementById('BranchFilter').value = "";
    document.getElementById('OfficeFilter').value = "";
    document.getElementById('RankFilter').value = "top10";
    updateOfficeFilter("");
    filterAndRender();
}

function printTable() { window.print(); }
function openPage() { window.location.href = 'https://m-direct.vercel.app/'; }
</script>
</body>
</html>
